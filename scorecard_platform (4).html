<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Orthopedics — Performance Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b;--surface:#111114;--surface2:#1a1a1f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f4f4f5;--muted:#888;--hint:#444;
  --accent:#e8e8e8;--accent-dim:rgba(232,232,232,0.08);--accent-border:rgba(232,232,232,0.2);
  --red:#f87171;--red-dim:rgba(248,113,113,0.12);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);
  --green:#4ade80;--green-dim:rgba(74,222,128,0.12);
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input,select,textarea{font-family:'Inter',sans-serif;font-size:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:0 12px;height:38px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{height:auto;padding:8px 12px;resize:none}
select option{background:var(--surface2)}
input[type=month]{cursor:pointer}
button{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text);padding:0 14px;height:36px;transition:all .15s;white-space:nowrap}
button:hover{background:var(--surface2)}
button.primary{background:var(--text);color:#0a0a0b;border-color:transparent;font-weight:600}
button.primary:hover{opacity:.88}
button.ghost{border-color:transparent;color:var(--muted)}
button.ghost:hover{color:var(--text);background:var(--surface2)}
button.sm{height:28px;padding:0 10px;font-size:12px}
button.danger{background:var(--red-dim);color:var(--red);border-color:rgba(248,113,113,0.2)}
button.danger:hover{background:rgba(248,113,113,0.25)}
button:disabled{opacity:.4;cursor:not-allowed}
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;border-bottom:1px solid var(--border);background:var(--surface);gap:12px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:16px}
.logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.04em}
.nav-tabs{display:flex;gap:2px}
.nav-tab{height:32px;padding:0 12px;border-radius:var(--radius-sm);border:none;font-size:13px;color:var(--muted);background:transparent;cursor:pointer}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--text);background:var(--surface2);font-weight:500;border:1px solid var(--border2)}
.topbar-right{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text);flex-shrink:0}
.content{flex:1;padding:24px;max-width:1200px;margin:0 auto;width:100%}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric-val{font-size:26px;font-weight:500;font-family:'Space Mono',monospace}
.metric-val.green{color:var(--green)}
.metric-val.red{color:var(--red)}
.metric-val.amber{color:var(--amber)}
.metric-val.green{color:var(--green)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.015)}
.yn{display:inline-flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
.yn button{height:26px;padding:0 8px;font-size:11px;border:none;border-right:1px solid var(--border2);border-radius:0;background:transparent;color:var(--hint)}
.yn button:last-child{border-right:none}
.yn button:hover{background:var(--surface2);color:var(--text)}
.yn button.sy{background:var(--green-dim);color:var(--green)}
.yn button.sn{background:var(--red-dim);color:var(--red)}
.yn button.sna{background:var(--surface2);color:var(--muted)}
.yn button.sa{background:var(--green-dim);color:var(--green)}
.yn button.sd{background:var(--red-dim);color:var(--red)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-manager{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(96,165,250,0.2)}
.badge-rep{background:var(--surface2);color:var(--muted);border:1px solid var(--border2)}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
.pill-green{background:var(--green-dim);color:var(--green)}
.pill-amber{background:var(--amber-dim);color:var(--amber)}
.pill-red{background:var(--red-dim);color:var(--red)}
.pill-gray{background:var(--surface2);color:var(--muted)}
.score-bar{width:60px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px}
.score-bar-fill{height:100%;border-radius:2px}
.rep-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.rep-row:last-child{border-bottom:none}
.rep-row:hover{background:var(--surface2)}
.rep-row-info{flex:1;min-width:0}
.rep-row-name{font-weight:500;font-size:14px}
.rep-row-email{font-size:12px;color:var(--muted)}
.note-input{background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:4px 0;font-size:12px;color:var(--text);height:28px;width:100%}
.note-input:focus{border-bottom-color:var(--accent);outline:none}
.note-input::placeholder{color:var(--hint)}
.note-input:disabled{opacity:.35;cursor:not-allowed}
.cat-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.cat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)}
.cat-name{font-size:13px;font-weight:500}
.center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.err{color:var(--red);font-size:12px;margin-top:6px}
.divider{height:1px;background:var(--border);margin:20px 0}
.loading{display:flex;align-items:center;justify-content:center;height:160px;color:var(--muted);font-size:13px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;max-width:440px;width:100%}
.modal-title{font-size:15px;font-weight:500;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;z-index:200;pointer-events:none;animation:tin .2s ease}
.toast.ok{border-color:var(--accent-border);color:var(--accent)}
.toast.err{border-color:rgba(248,113,113,0.35);color:var(--red)}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.step-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px}
.step-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:4px}
.step-text{font-size:13px;line-height:1.6}
.step-text code{background:rgba(110,231,183,0.1);color:var(--accent);padding:1px 5px;border-radius:3px;font-family:'Space Mono',monospace;font-size:12px}
.empty{text-align:center;padding:40px 24px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const CATS = ['IB','OC','Ancillary','RomTech','Held Billing','PPAs','Pickups','Deliveries','Attitude'];
const CFG_KEY = 'sc_cfg';
const SESSION_KEY = 'sc_session';

// ─── STATE ────────────────────────────────────────────────────────────────────
let CFG = null;       // {url, anonKey}
let SESSION = null;   // {access_token, refresh_token, user}
let PROFILE = null;   // {id, name, role, email}
let APP = {
  tab: 'scorecards',
  repView: null,
  month: new Date().toISOString().slice(0,7),
  criteria: {},
  users: [],
  scorecard: { scores:{}, emp_notes:{}, mgr_notes:{}, mgr_agree:{} },
};

// ─── SUPABASE REST HELPERS ────────────────────────────────────────────────────
function headers(extra={}) {
  const h = {
    'Content-Type': 'application/json',
    'apikey': CFG.anonKey,
    'Authorization': 'Bearer ' + (SESSION ? SESSION.access_token : CFG.anonKey),
    ...extra
  };
  return h;
}

async function sbFetch(path, opts={}) {
  const res = await fetch(CFG.url + path, {
    ...opts,
    headers: { ...headers(), ...(opts.headers||{}) }
  });
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch(e) { data = text; }
  if (!res.ok) {
    const msg = (data && (data.message || data.error_description || data.msg)) || res.statusText;
    throw new Error(msg);
  }
  return data;
}

// Auth
async function authSignIn(email, password) {
  const data = await sbFetch('/auth/v1/token?grant_type=password', {
    method: 'POST',
    body: JSON.stringify({ email, password })
  });
  return data; // {access_token, refresh_token, user, ...}
}

async function authSignUp(email, password, meta) {
  const data = await sbFetch('/auth/v1/signup', {
    method: 'POST',
    body: JSON.stringify({ email, password, data: meta })
  });
  return data;
}

async function authRefresh(refresh_token) {
  const data = await sbFetch('/auth/v1/token?grant_type=refresh_token', {
    method: 'POST',
    body: JSON.stringify({ refresh_token })
  });
  return data;
}

// PostgREST REST API
async function dbSelect(table, params='') {
  return sbFetch(`/rest/v1/${table}?${params}`, { method: 'GET', headers: { 'Prefer': 'return=representation' } });
}

async function dbInsert(table, body) {
  return sbFetch(`/rest/v1/${table}`, {
    method: 'POST',
    headers: { 'Prefer': 'return=representation' },
    body: JSON.stringify(body)
  });
}

async function dbUpsert(table, body, onConflict) {
  return sbFetch(`/rest/v1/${table}?on_conflict=${encodeURIComponent(onConflict)}`, {
    method: 'POST',
    headers: { 'Prefer': 'return=representation,resolution=merge-duplicates' },
    body: JSON.stringify(body)
  });
}

async function dbUpdate(table, match, body) {
  const q = Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');
  return sbFetch(`/rest/v1/${table}?${q}`, {
    method: 'PATCH',
    headers: { 'Prefer': 'return=representation' },
    body: JSON.stringify(body)
  });
}

async function dbDelete(table, match) {
  const q = Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');
  return sbFetch(`/rest/v1/${table}?${q}`, { method: 'DELETE' });
}

// ─── DB OPERATIONS ────────────────────────────────────────────────────────────
async function dbGetCriteria() {
  const rows = await dbSelect('criteria', 'order=category.asc,sort_order.asc');
  const out = {};
  CATS.forEach(c => out[c] = []);
  (rows||[]).forEach(r => { if(out[r.category]) out[r.category].push({id:r.id, t:r.text}); });
  return out;
}

async function dbGetProfiles() {
  return (await dbSelect('profiles', 'order=name.asc')) || [];
}

async function dbGetScorecard(userId, month) {
  const rows = await dbSelect('scorecard_entries',
    `user_id=eq.${userId}&month=eq.${encodeURIComponent(month)}`);
  const out = { scores:{}, emp_notes:{}, mgr_notes:{}, mgr_agree:{} };
  (rows||[]).forEach(r => {
    out.scores[`${r.category}|${r.criteria_text}|${r.week}`] = r.score;
    const ck = `${r.category}|${r.criteria_text}`;
    if(r.emp_note) out.emp_notes[ck] = r.emp_note;
    if(r.mgr_note) out.mgr_notes[ck] = r.mgr_note;
    if(r.mgr_agree) out.mgr_agree[ck] = r.mgr_agree;
  });
  return out;
}

async function dbSaveScore(userId, month, category, criteriaText, week, score) {
  await dbUpsert('scorecard_entries',
    { user_id:userId, month, category, criteria_text:criteriaText, week, score },
    'user_id,month,category,criteria_text,week'
  );
}

async function dbSaveNote(userId, month, category, criteriaText, field, value) {
  // ensure rows exist for all weeks first, then patch
  const ws = getWeeks(month);
  for (const w of ws) {
    await dbUpsert('scorecard_entries',
      { user_id:userId, month, category, criteria_text:criteriaText, week:w, [field]:value },
      'user_id,month,category,criteria_text,week'
    );
  }
}

async function dbSaveAgree(userId, month, category, criteriaText, agree) {
  const ws = getWeeks(month);
  for (const w of ws) {
    await dbUpsert('scorecard_entries',
      { user_id:userId, month, category, criteria_text:criteriaText, week:w, mgr_agree:agree },
      'user_id,month,category,criteria_text,week'
    );
  }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function getWeeks(m) {
  if(!m) return ['Week 1','Week 2','Week 3','Week 4'];
  const [y,mo] = m.split('-').map(Number);
  const ws=[], last=new Date(y,mo,0);
  let d = new Date(y,mo-1,1);
  while(d.getDay()!==1) d.setDate(d.getDate()+1);
  while(d<=last){
    const s=d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
    const e=new Date(d); e.setDate(e.getDate()+4);
    ws.push(s+'-'+e.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}));
    d.setDate(d.getDate()+7);
  }
  return ws.length ? ws : ['Week 1','Week 2','Week 3','Week 4'];
}

function initials(name) { return (name||'?').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase(); }

function calcPct(sc, criteria, month) {
  const ws=getWeeks(month); let y=0,n=0;
  CATS.forEach(c=>(criteria[c]||[]).forEach(cr=>{
    ws.forEach(w=>{ const v=sc.scores[`${c}|${cr.t}|${w}`]; if(v==='y')y++; else if(v==='n')n++; });
  }));
  return y+n>0 ? Math.round(y/(y+n)*100) : null;
}

function scoreColor(p) { return p===null?'':p>=80?'green':p>=60?'amber':'red'; }

function statusPill(p) {
  if(p===null) return '<span class="pill pill-gray">Not started</span>';
  if(p>=80) return '<span class="pill pill-green">On track</span>';
  if(p>=60) return '<span class="pill pill-amber">Needs attention</span>';
  return '<span class="pill pill-red">At risk</span>';
}

function scoreBarHTML(p) {
  if(p===null) return '';
  const c = p>=80?'var(--green)':p>=60?'var(--amber)':'var(--red)';
  return `<span class="score-bar"><span class="score-bar-fill" style="width:${p}%;background:${c}"></span></span>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toast(msg, type='ok') {
  const t=document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

// ─── SETUP SCREEN ─────────────────────────────────────────────────────────────
const SETUP_SQL = `-- Run this in Supabase SQL Editor

create extension if not exists "uuid-ossp";

-- Profiles table
create table public.profiles (
  id uuid references auth.users on delete cascade primary key,
  name text not null,
  role text not null default 'rep' check (role in ('rep','manager')),
  email text,
  created_at timestamptz default now()
);
alter table public.profiles enable row level security;
create policy "profiles_all" on public.profiles for all using (true) with check (true);

-- Auto-create profile on signup
create or replace function public.handle_new_user()
returns trigger language plpgsql security definer as $$
begin
  insert into public.profiles (id, name, email, role)
  values (
    new.id,
    coalesce(new.raw_user_meta_data->>'name', split_part(new.email,'@',1)),
    new.email,
    coalesce(new.raw_user_meta_data->>'role', 'rep')
  );
  return new;
end;
$$;
drop trigger if exists on_auth_user_created on auth.users;
create trigger on_auth_user_created
  after insert on auth.users
  for each row execute procedure public.handle_new_user();

-- Criteria table
create table public.criteria (
  id uuid default uuid_generate_v4() primary key,
  category text not null,
  text text not null,
  sort_order int default 0,
  created_at timestamptz default now()
);
alter table public.criteria enable row level security;
create policy "criteria_all" on public.criteria for all using (true) with check (true);

-- Seed default criteria
insert into public.criteria (category, text, sort_order) values
  ('OC', 'Hit 3 OCs per week', 0),
  ('PPAs', '50 per week', 0),
  ('Pickups', 'Weekly completion', 0),
  ('Deliveries', 'Weekly completion', 0),
  ('Attitude', 'Positive attitude', 0);

-- Scorecard entries table
create table public.scorecard_entries (
  id uuid default uuid_generate_v4() primary key,
  user_id uuid references public.profiles(id) on delete cascade not null,
  month text not null,
  category text not null,
  criteria_text text not null,
  week text not null,
  score text,
  emp_note text,
  mgr_note text,
  mgr_agree text,
  updated_at timestamptz default now(),
  unique(user_id, month, category, criteria_text, week)
);
alter table public.scorecard_entries enable row level security;
create policy "entries_all" on public.scorecard_entries for all using (true) with check (true);
`;

function renderSetup() {
  document.getElementById('root').innerHTML = `

function copySQL(el) {
  navigator.clipboard.writeText(SETUP_SQL).then(()=>{
    document.getElementById('copy-lbl').textContent = 'Copied to clipboard ✓';
    setTimeout(()=>{ const e=document.getElementById('copy-lbl'); if(e) e.textContent='Click to copy SQL schema ↗'; }, 2500);
  }).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=SETUP_SQL;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    document.getElementById('copy-lbl').textContent = 'Copied ✓';
  });
}

async function doSetup() {
  const url = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
  const anonKey = document.getElementById('cfg-key').value.trim();
  const errEl = document.getElementById('cfg-err');
  errEl.textContent = '';
  if(!url || !anonKey) { errEl.textContent='Both fields are required'; return; }
  errEl.textContent = 'Testing connection…';
  CFG = { url, anonKey };
  try {
    const res = await fetch(`${url}/rest/v1/profiles?limit=1`, {
      headers: { 'apikey': anonKey, 'Authorization': 'Bearer '+anonKey }
    });
    if(!res.ok && res.status !== 406) {
      const t = await res.text(); throw new Error(t||res.statusText);
    }
    localStorage.setItem(CFG_KEY, JSON.stringify(CFG));
    renderWelcome();
  } catch(e) {
    errEl.textContent = 'Connection failed: '+e.message+'. Check your URL and key, and make sure you ran the SQL.';
    CFG = null;
  }
}

function clearConfig() {
  localStorage.removeItem(CFG_KEY);
  localStorage.removeItem(SESSION_KEY);
  CFG=null; SESSION=null; PROFILE=null;
  renderSetup();
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass = document.getElementById('li-pass').value;
  const btn = document.getElementById('li-btn');
  const errEl = document.getElementById('li-err');
  errEl.textContent=''; btn.disabled=true; btn.textContent='Signing in…';
  try {
    const data = await authSignIn(email, pass);
    SESSION = data;
    localStorage.setItem(SESSION_KEY, JSON.stringify({ access_token:data.access_token, refresh_token:data.refresh_token }));
    const profiles = await dbSelect('profiles', `id=eq.${data.user.id}`);
    PROFILE = profiles[0];
    if(!PROFILE) throw new Error('Profile not found. Make sure the SQL trigger was created.');
    APP.criteria = await dbGetCriteria();
    APP.users = await dbGetProfiles();
    if(PROFILE.role==='rep') APP.scorecard = await dbGetScorecard(PROFILE.id, APP.month);
    renderApp();
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled=false; btn.textContent='Sign in';
  }
}

  localStorage.removeItem(SESSION_KEY);

}

function switchTab(tab) { APP.tab=tab; APP.repView=null; renderApp(); }

// ─── SCORECARD LIST (manager) ─────────────────────────────────────────────────
function renderScorecardList() {
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <span style="font-size:16px;font-weight:500">All reps — ${APP.month}</span>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="month" value="${APP.month}" style="width:160px;height:34px" onchange="changeMonth(this.value)">
      <button class="primary sm" onclick="exportAll()">Export all CSV</button>
    </div>
  </div>
  <div id="rep-list-area"><div class="loading"><div class="spinner"></div> Loading scores…</div></div>`;
}

async function loadRepScores() {
  const reps = APP.users.filter(u=>u.role==='rep');
  const scoreMap = {};
  await Promise.all(reps.map(async r => {
    const sc = await dbGetScorecard(r.id, APP.month);
    scoreMap[r.id] = { pct: calcPct(sc, APP.criteria, APP.month), sc };
  }));

  const scored = reps.filter(r=>scoreMap[r.id].pct!==null);
  const avg = scored.length ? Math.round(scored.reduce((a,r)=>a+scoreMap[r.id].pct,0)/scored.length) : null;
  const above = scored.filter(r=>scoreMap[r.id].pct>=80).length;

  let html = `
  <div class="metrics">
    <div class="metric"><div class="metric-label">Team avg</div><div class="metric-val ${scoreColor(avg)}">${avg===null?'—':avg+'%'}</div></div>
    <div class="metric"><div class="metric-label">At/above 80%</div><div class="metric-val green">${above}</div></div>
    <div class="metric"><div class="metric-label">Reps tracked</div><div class="metric-val">${scored.length}/${reps.length}</div></div>
    <div class="metric"><div class="metric-label">Total reps</div><div class="metric-val">${reps.length}</div></div>
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">`;

  if(!reps.length) {
    html += `<div class="empty">No reps yet. Add team members in the Team tab.</div>`;
  } else {
    reps.forEach(r => {
      const p = scoreMap[r.id].pct;
      html += `
      <div class="rep-row" onclick="openRep('${r.id}')">
        <div class="avatar">${initials(r.name)}</div>
        <div class="rep-row-info">
          <div class="rep-row-name">${esc(r.name)}</div>
          <div class="rep-row-email">${esc(r.email||'')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          ${statusPill(p)}
          <span style="font-family:'Space Mono',monospace;font-size:14px;font-weight:500;color:${p===null?'var(--hint)':p>=80?'var(--accent)':p>=60?'var(--amber)':'var(--red)'}">${p===null?'—':p+'%'}</span>
          ${scoreBarHTML(p)}
          <button class="sm" onclick="event.stopPropagation();openRep('${r.id}')">Review →</button>
        </div>
      </div>`;
    });
  }
  html += `</div>`;

  const area = document.getElementById('rep-list-area');
  if(area) area.innerHTML = html;
}

async function openRep(uid) {
  APP.repView = uid;
  APP.scorecard = await dbGetScorecard(uid, APP.month);
  renderApp();
}

async function changeMonth(m) {
  APP.month = m;
  const uid = APP.repView || (PROFILE.role==='rep' ? PROFILE.id : null);
  if(uid) {
    APP.scorecard = await dbGetScorecard(uid, m);
  }
  renderApp();
}

// ─── SCORECARD DETAIL ─────────────────────────────────────────────────────────
function renderScorecardDetail() {
  const rep = APP.users.find(u=>u.id===APP.repView) || PROFILE;
  return renderRepScorecard(rep, true);
}

function renderRepScorecard(rep, isManager) {
  const uid = rep.id;
  const ws = getWeeks(APP.month);
  const sc = APP.scorecard;
  let y=0, n=0, na=0;
  CATS.forEach(c=>(APP.criteria[c]||[]).forEach(cr=>{
    ws.forEach(w=>{ const v=sc.scores[`${c}|${cr.t}|${w}`]; if(v==='y')y++; else if(v==='n')n++; else if(v==='na')na++; });
  }));
  const pct = y+n>0 ? Math.round(y/(y+n)*100) : null;

  let html = `
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    ${isManager ? `<button class="ghost sm" onclick="APP.repView=null;renderApp()">← Back</button>` : ''}
    <div class="avatar">${initials(rep.name)}</div>
    <span style="font-size:16px;font-weight:500">${esc(rep.name)}</span>
    <input type="month" value="${APP.month}" style="width:155px;height:32px;font-size:13px" onchange="changeMonth(this.value)">
    ${isManager ? `<button class="primary sm" onclick="exportOne('${uid}')">Export CSV</button>` : ''}
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">Score</div><div class="metric-val ${scoreColor(pct)}">${pct===null?'—':pct+'%'}</div></div>
    <div class="metric"><div class="metric-label">Met</div><div class="metric-val green">${y}</div></div>
    <div class="metric"><div class="metric-label">Missed</div><div class="metric-val ${n>0?'red':''}">${n}</div></div>
    <div class="metric"><div class="metric-label">N/A</div><div class="metric-val">${na}</div></div>
  </div>`;

  CATS.forEach(c => {
    const crits = APP.criteria[c]||[];
    html += `<div class="cat-block"><div class="cat-head"><span class="cat-name">${esc(c)}</span>${!crits.length?'<span style="font-size:11px;color:var(--hint)">no criteria set</span>':''}</div>`;
    if(!crits.length) { html += `<div style="padding:12px 16px;font-size:12px;color:var(--hint)">N/A — configure criteria in the Criteria tab</div></div>`; return; }

    html += `<div class="table-wrap"><table><thead><tr><th style="min-width:140px">Criteria</th>`;
    ws.forEach(w => html += `<th style="min-width:110px;font-size:10px">${esc(w)}</th>`);
    html += `<th style="min-width:72px">Mgr</th><th style="min-width:130px">Rep note</th><th style="min-width:130px">Mgr note</th></tr></thead><tbody>`;

    crits.forEach(cr => {
      const ck = `${c}|${cr.t}`;
      const ag = sc.mgr_agree[ck]||'';
      const en = sc.emp_notes[ck]||'';
      const mn = sc.mgr_notes[ck]||'';
      const safe = esc(cr.t);
      const jsStr = cr.t.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

      html += `<tr><td style="font-size:12px;white-space:normal;min-width:140px">${safe}</td>`;

      ws.forEach(w => {
        const wjs = w.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        const v = sc.scores[`${c}|${cr.t}|${w}`]||'';
        const canScore = PROFILE.role==='rep' ? !APP.repView : true;
        html += `<td><div class="yn">
          <button class="${v==='y'?'sy':''}" ${!canScore?'disabled':''} onclick="setScore('${uid}','${esc(c)}','${jsStr}','${wjs}','y',this)">Y</button>
          <button class="${v==='n'?'sn':''}" ${!canScore?'disabled':''} onclick="setScore('${uid}','${esc(c)}','${jsStr}','${wjs}','n',this)">N</button>
          <button class="${v==='na'?'sna':''}" ${!canScore?'disabled':''} onclick="setScore('${uid}','${esc(c)}','${jsStr}','${wjs}','na',this)">NA</button>
        </div></td>`;
      });

      html += `<td><div class="yn">
        <button class="${ag==='a'?'sa':''}" ${!isManager?'disabled':''} onclick="setAgree('${uid}','${esc(c)}','${jsStr}','a',this)">A</button>
        <button class="${ag==='d'?'sd':''}" ${!isManager?'disabled':''} onclick="setAgree('${uid}','${esc(c)}','${jsStr}','d',this)">D</button>
      </div></td>`;

      const isRep = PROFILE.role==='rep';
      html += `<td><input class="note-input" value="${esc(en)}" placeholder="Rep note…" ${isRep?'':'disabled'} onchange="saveNote('${uid}','${esc(c)}','${jsStr}','emp_note',this.value)"></td>`;
      html += `<td><input class="note-input" value="${esc(mn)}" placeholder="Mgr note…" ${isManager?'':'disabled'} onchange="saveNote('${uid}','${esc(c)}','${jsStr}','mgr_note',this.value)"></td>`;
      html += `</tr>`;
    });

    html += `</tbody></table></div></div>`;
  });

  return html;
}

// Inline score/note/agree handlers (update DOM immediately, save in background)
async function setScore(uid, cat, crit, week, val, btn) {
  const sk = `${cat}|${crit}|${week}`;
  const prev = APP.scorecard.scores[sk];
  const newVal = prev===val ? null : val;
  APP.scorecard.scores[sk] = newVal;
  const row = btn.closest('.yn');
  row.querySelectorAll('button').forEach(b=>b.className='');
  if(newVal==='y') btn.className='sy';
  else if(newVal==='n') btn.className='sn';
  else if(newVal==='na') btn.className='sna';
  try { await dbSaveScore(uid, APP.month, cat, crit, week, newVal); }
  catch(e) { toast('Save failed: '+e.message,'err'); }
}

async function setAgree(uid, cat, crit, val, btn) {
  const ck = `${cat}|${crit}`;
  const prev = APP.scorecard.mgr_agree[ck];
  const newVal = prev===val ? null : val;
  APP.scorecard.mgr_agree[ck] = newVal;
  const row = btn.closest('.yn');
  row.querySelectorAll('button').forEach(b=>b.className='');
  if(newVal==='a') btn.className='sa';
  else if(newVal==='d') btn.className='sd';
  try { await dbSaveAgree(uid, APP.month, cat, crit, newVal); }
  catch(e) { toast('Save failed: '+e.message,'err'); }
}

async function saveNote(uid, cat, crit, field, value) {
  if(field==='emp_note') APP.scorecard.emp_notes[`${cat}|${crit}`] = value;
  else APP.scorecard.mgr_notes[`${cat}|${crit}`] = value;
  try { await dbSaveNote(uid, APP.month, cat, crit, field, value); toast('Saved'); }
  catch(e) { toast('Save failed: '+e.message,'err'); }
}

function renderTeam() {

  APP.users.forEach(u => {
    html += `<tr>
      <td><div class="avatar" style="width:28px;height:28px;font-size:10px">${initials(u.name)}</div></td>
      <td style="font-weight:500">${esc(u.name)}</td>

function showAddUserModal() {
  document.getElementById('modal-root').innerHTML = `
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Add team member</div>
    <div class="field"><label>Full name</label><input id="nu-name" placeholder="Jane Smith"></div>
    <div class="field"><label>Email</label><input id="nu-email" type="email" placeholder="jane@company.com"></div>
    <div class="field"><label>Temporary password</label><input id="nu-pass" type="password" placeholder="Min 6 characters"></div>
    <div class="field"><label>Role</label>
      <select id="nu-role"><option value="rep">Rep</option><option value="manager">Manager</option></select>
    </div>
    <div id="nu-err" class="err"></div>
    <div class="modal-footer">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" id="nu-btn" onclick="doAddUser()">Add user</button>
    </div>
  </div></div>`;
}

function closeModal() { document.getElementById('modal-root').innerHTML=''; }

async function doAddUser() {
  const name = document.getElementById('nu-name').value.trim();
  const email = document.getElementById('nu-email').value.trim();
  const pass = document.getElementById('nu-pass').value;
  const role = document.getElementById('nu-role').value;
  const errEl = document.getElementById('nu-err');
  const btn = document.getElementById('nu-btn');
  if(!name||!email||!pass) { errEl.textContent='All fields required'; return; }
  if(pass.length<6) { errEl.textContent='Password must be at least 6 characters'; return; }
  btn.disabled=true; btn.textContent='Adding…';
  try {
    await authSignUp(email, pass, { name, role });
    await new Promise(r=>setTimeout(r,900)); // let trigger fire
    APP.users = await dbGetProfiles();
    closeModal();
    toast(`${name} added`);
    renderApp();
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled=false; btn.textContent='Add user';
  }
}

function confirmRemove(id, name) {
  document.getElementById('modal-root').innerHTML = `
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Remove ${esc(name)}?</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:4px">All their scorecard data will be deleted. This cannot be undone.</p>
    <div class="modal-footer">
      <button onclick="closeModal()">Cancel</button>
      <button class="danger" onclick="doRemoveUser('${id}')">Remove</button>
    </div>
  </div></div>`;
}

async function doRemoveUser(id) {
  try {
    await dbDelete('profiles', {id});
    APP.users = APP.users.filter(u=>u.id!==id);
    closeModal(); toast('User removed'); renderApp();
  } catch(e) { toast(e.message,'err'); }
}

// ─── CRITERIA ─────────────────────────────────────────────────────────────────
function renderCriteria() {
  let html = `<p style="font-size:13px;color:var(--muted);margin-bottom:16px">Categories are fixed. Criteria changes apply to all reps going forward.</p>`;
  CATS.forEach(c => {
    const crits = APP.criteria[c]||[];
    html += `<div class="cat-block" style="margin-bottom:10px">
      <div class="cat-head">
        <span class="cat-name">${esc(c)}</span>
        <span style="font-size:11px;color:var(--hint)">${crits.length} criteria</span>
      </div>`;

    if(crits.length) {
      html += `<table><tbody>`;
      crits.forEach(cr => {
        html += `<tr>
          <td style="font-size:13px">${esc(cr.t)}</td>
          <td style="width:80px;text-align:right"><button class="sm danger" onclick="doRemoveCrit('${cr.id}','${esc(c)}')">Remove</button></td>
        </tr>`;
      });
      html += `</tbody></table>`;
    } else {
      html += `<div style="padding:10px 16px;font-size:12px;color:var(--hint)">No criteria — this category shows as N/A on scorecards</div>`;
    }

    const cid = c.replace(/[\s\/]/g,'_');
    html += `<div style="padding:10px 16px;display:flex;gap:8px;border-top:1px solid var(--border)">
      <input id="nc-${cid}" placeholder="Add a criterion…" style="height:32px;font-size:13px" onkeydown="if(event.key==='Enter')doAddCrit('${esc(c)}')">
      <button class="sm" onclick="doAddCrit('${esc(c)}')">Add</button>
    </div></div>`;
  });
  return html;
}

async function doAddCrit(c) {
  const cid = c.replace(/[\s\/]/g,'_');
  const el = document.getElementById('nc-'+cid);
  const val = el.value.trim();
  if(!val) return;
  try {
    const rows = await dbInsert('criteria', { category:c, text:val, sort_order:(APP.criteria[c]||[]).length });
    if(!APP.criteria[c]) APP.criteria[c]=[];
    APP.criteria[c].push({ id:rows[0].id, t:rows[0].text });
    el.value=''; toast('Criterion added'); renderApp();
  } catch(e) { toast(e.message,'err'); }
}

async function doRemoveCrit(id, c) {
  try {
    await dbDelete('criteria', {id});
    APP.criteria[c] = APP.criteria[c].filter(cr=>cr.id!==id);
    toast('Removed'); renderApp();
  } catch(e) { toast(e.message,'err'); }
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
async function exportOne(uid) {
  const rep = APP.users.find(u=>u.id===uid)||PROFILE;
  const sc = await dbGetScorecard(uid, APP.month);
  dlCSV(buildCSV([{rep,sc}]), `scorecard_${rep.name.replace(/\s/g,'_')}_${APP.month}.csv`);
}

async function exportAll() {
  const reps = APP.users.filter(u=>u.role==='rep');
  const all = await Promise.all(reps.map(async r=>({ rep:r, sc:await dbGetScorecard(r.id,APP.month) })));
  dlCSV(buildCSV(all), `scorecards_all_${APP.month}.csv`);
}

function buildCSV(entries) {
  const ws = getWeeks(APP.month);
  const rows = [['Rep','Month','Category','Criteria',...ws,'Mgr agree','Rep note','Mgr note']];
  entries.forEach(({rep,sc}) => {
    CATS.forEach(c => {
      const crits = APP.criteria[c]||[];
      if(!crits.length) { rows.push([rep.name,APP.month,c,'N/A',...ws.map(()=>'N/A'),'','','']); return; }
      crits.forEach(cr => {
        const ck = `${c}|${cr.t}`;
        rows.push([rep.name,APP.month,c,cr.t,
          ...ws.map(w=>sc.scores[`${c}|${cr.t}|${w}`]||''),
          sc.mgr_agree[ck]||'', sc.emp_notes[ck]||'', sc.mgr_notes[ck]||''
        ]);
      });
    });
  });
  return rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
}

function dlCSV(csv, name) {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=name; a.click();
}

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:40px">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:16px">How to use</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="display:flex;gap:14px;align-items:flex-start">
          <div style="width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Space Mono',monospace;flex-shrink:0">1</div>
          <div style="font-size:13px;color:var(--text);line-height:1.5">Sign in with the email and password your manager gave you. First time? Ask your manager to add you in the <strong>Team</strong> tab.</div>
        </div>
        <div style="display:flex;gap:14px;align-items:flex-start">
          <div style="width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Space Mono',monospace;flex-shrink:0">2</div>
          <div style="font-size:13px;color:var(--text);line-height:1.5">Select the current month and mark each criterion <strong>Y</strong> (met), <strong>N</strong> (not met), or <strong>NA</strong> (not applicable) for each week.</div>
        </div>
        <div style="display:flex;gap:14px;align-items:flex-start">
          <div style="width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Space Mono',monospace;flex-shrink:0">3</div>
          <div style="font-size:13px;color:var(--text);line-height:1.5">Add notes in the <strong>Rep note</strong> column to explain any missed items. Managers review, agree/disagree, and add their own notes.</div>
        </div>
        <div style="display:flex;gap:14px;align-items:flex-start">
          <div style="width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Space Mono',monospace;flex-shrink:0">4</div>
          <div style="font-size:13px;color:var(--text);line-height:1.5">Your score is calculated automatically. <span style="color:var(--green)">80%+</span> = on track · <span style="color:var(--amber)">60–79%</span> = needs attention · <span style="color:var(--red)">below 60%</span> = at risk.</div>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:12px">
      <button class="primary" style="flex:1;height:44px;font-size:14px" onclick="localStorage.setItem('sc_welcomed','1');renderLogin()">Sign in →</button>
    </div>
    <p style="font-size:12px;color:var(--hint);text-align:center;margin-top:16px">Data is stored securely in your organization's Supabase database.</p>
  </div></div>`;
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
(async function boot() {
  const cfgRaw = localStorage.getItem(CFG_KEY);
  if(!cfgRaw) { renderSetup(); return; }
  if(!localStorage.getItem(WELCOME_KEY)) { renderWelcome(); return; }
  CFG = JSON.parse(cfgRaw);

  // Try to restore session
  const sesRaw = localStorage.getItem(SESSION_KEY);
  if(sesRaw) {
    const saved = JSON.parse(sesRaw);
    try {
      // Refresh the token to ensure it's valid
      const refreshed = await authRefresh(saved.refresh_token);
      SESSION = refreshed;
      localStorage.setItem(SESSION_KEY, JSON.stringify({
        access_token: refreshed.access_token,
        refresh_token: refreshed.refresh_token
      }));
      const profiles = await dbSelect('profiles', `id=eq.${refreshed.user.id}`);
      PROFILE = profiles[0];
      if(PROFILE) {
        APP.criteria = await dbGetCriteria();
        APP.users = await dbGetProfiles();
        if(PROFILE.role==='rep') APP.scorecard = await dbGetScorecard(PROFILE.id, APP.month);
        renderApp(); return;
      }
    } catch(e) {
      localStorage.removeItem(SESSION_KEY);
    }
  }
  renderLogin();
})();
</script>
